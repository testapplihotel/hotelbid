<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HotelBid — Set Your Price, We Book</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
  <header>
    <div class="container">
      <h1>HotelBid</h1>
      <p class="tagline">Set your price. We watch. We book.</p>
    </div>
  </header>

  <main class="container">
    <!-- Create Alert Form -->
    <section class="card" id="create-section">
      <h2>Create New Alert</h2>
      <form id="alert-form">
        <div class="form-grid">
          <div class="form-group">
            <label for="hotel_name">Hotel Name</label>
            <input type="text" id="hotel_name" name="hotel_name" placeholder="e.g. Isrotel Sport Club" required>
          </div>
          <div class="form-group">
            <label for="destination">Destination</label>
            <input type="text" id="destination" name="destination" placeholder="e.g. Eilat">
          </div>
          <div class="form-group">
            <label for="check_in">Check-in</label>
            <input type="date" id="check_in" name="check_in" required>
          </div>
          <div class="form-group">
            <label for="check_out">Check-out</label>
            <input type="date" id="check_out" name="check_out" required>
          </div>
          <div class="form-group">
            <label for="adults">Adults</label>
            <input type="number" id="adults" name="adults" value="2" min="1" max="10">
          </div>
          <div class="form-group">
            <label for="children">Children</label>
            <input type="number" id="children" name="children" value="0" min="0" max="10">
          </div>
          <div class="form-group">
            <label for="target_price">Target Price (NIS)</label>
            <input type="number" id="target_price" name="target_price" placeholder="14000" required>
          </div>
          <div class="form-group">
            <label for="user_email">Your Email</label>
            <input type="email" id="user_email" name="user_email" value="test@hotelbid.com">
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Create Alert</button>
      </form>
    </section>

    <!-- Active Alerts -->
    <section class="card" id="alerts-section">
      <div class="section-header">
        <h2>My Alerts</h2>
        <button class="btn btn-secondary" onclick="loadAlerts()">Refresh</button>
      </div>
      <div id="alerts-list"></div>
    </section>

    <!-- Bookings -->
    <section class="card" id="bookings-section">
      <h2>Booking History</h2>
      <div id="bookings-list"></div>
    </section>

    <!-- Price Chart Modal -->
    <div id="chart-modal" class="modal" style="display:none">
      <div class="modal-content card">
        <div class="modal-header">
          <h3 id="chart-title">Price History</h3>
          <button class="btn-close" onclick="closeChart()">&times;</button>
        </div>
        <canvas id="price-chart"></canvas>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>HotelBid &copy; 2026 — Free cancellation only</p>
    </div>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
